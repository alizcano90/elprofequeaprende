<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ruleta Aleatoria de Estudiantes</title>
    <style>
        :root {
            --bg: #1f1c2a;
            --bg-soft: #2a2640;
            --text: #efe7ff;
            --muted: #d4c7ea;
            --panel: #2f2a47;
            --panel-border: #4f4872;
            --btn: #f5c7df;
            --btn-text: #312344;
            --btn-disabled: #ccbcd5;
            --accent: #f3e5ff;
            --input-bg: #f8edf9;
            --input-text: #2f213c;
            --pointer: #ff9bb9;
            --modal-backdrop: rgba(25, 18, 38, 0.6);
        }

        body[data-theme="light"] {
            --bg: #fff7f4;
            --bg-soft: #ffe8f2;
            --text: #4d3350;
            --muted: #7b5776;
            --panel: #fff3fa;
            --panel-border: #ebcde1;
            --btn: #c8e9ff;
            --btn-text: #2f4452;
            --btn-disabled: #d8e3ea;
            --accent: #ffffff;
            --input-bg: #ffffff;
            --input-text: #2f213c;
            --pointer: #f49ec8;
            --modal-backdrop: rgba(62, 44, 80, 0.35);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top, var(--bg-soft), var(--bg) 72%);
            color: var(--text);
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            display: flex;
            flex-direction: column;
            padding: 14px;
            gap: 10px;
        }

        h1 {
            text-align: center;
            font-size: clamp(1.3rem, 3vw, 2.1rem);
            margin: 8px 0;
        }

        .toolbar {
            display: flex;
            justify-content: center;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            width: min(960px, 98vw);
            margin: 0 auto;
            padding: 10px;
            border-radius: 14px;
            border: 1px solid var(--panel-border);
            background: color-mix(in srgb, var(--panel) 92%, white 8%);
        }

        .toolbar label {
            font-weight: 700;
            color: var(--muted);
        }

        .toolbar select {
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            padding: 8px 10px;
            background: var(--accent);
            color: #2f213c;
            font-weight: 700;
        }

        .toolbar select option {
            color: #2f213c;
        }

        .container {
            display: flex;
            gap: 14px;
            flex: 1;
            width: min(1200px, 98vw);
            margin: 0 auto;
        }

        .left, .right {
            flex: 1;
            border-radius: 14px;
            border: 1px solid var(--panel-border);
            background: color-mix(in srgb, var(--panel) 94%, white 6%);
            padding: 12px;
        }

        .left {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            min-height: clamp(260px, 52vh, 620px);
        }

        .pointer {
            width: 0;
            height: 0;
            z-index: 10;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-bottom: 28px solid var(--pointer);
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
        }

        canvas {
            width: 100%;
            max-width: 560px;
            height: auto;
            border-radius: 50%;
            box-shadow: 0 12px 24px rgba(0,0,0,.2);
            background: var(--accent);
        }

        .right {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .right textarea {
            width: 100%;
            min-height: 240px;
            flex: 1;
            font-size: 17px;
            padding: 10px;
            background: var(--input-bg);
            color: var(--input-text);
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            resize: vertical;
        }

        .right textarea::placeholder {
            color: #6a5a76;
        }

        .right button {
            width: 100%;
            padding: 11px;
            font-size: 17px;
            font-weight: 800;
            background: var(--btn);
            color: var(--btn-text);
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .right button:disabled {
            background: var(--btn-disabled);
            cursor: not-allowed;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--modal-backdrop);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .modal-content {
            background: var(--panel);
            color: var(--text);
            width: min(360px, 90vw);
            min-height: 220px;
            padding: 18px;
            border-radius: 14px;
            border: 1px solid var(--panel-border);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 10px;
        }

        .modal-content h2 {
            margin: 0;
        }

        .modal-content button {
            margin-top: 6px;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: var(--btn);
            color: var(--btn-text);
            font-weight: 800;
            cursor: pointer;
        }

        @media (max-width: 920px) {
            .container {
                flex-direction: column;
            }

            .left {
                min-height: clamp(240px, 42vh, 520px);
            }

            .right textarea {
                min-height: 150px;
            }
        }

        body.portrait .left {
            min-height: clamp(300px, 56vh, 720px);
        }

        body.portrait .right {
            min-height: clamp(150px, 24vh, 300px);
        }

        body.portrait .right textarea {
            min-height: clamp(100px, 16vh, 180px);
        }

        body.landscape .left {
            min-height: clamp(260px, 58vh, 700px);
        }
    </style>
</head>
<body data-theme="dark">
    <h1>🎯 Ruleta Aleatoria de Estudiantes</h1>

    <div class="toolbar">
        <label for="themeSelect">Tema:</label>
        <select id="themeSelect" aria-label="Tema visual">
            <option value="dark">Oscuro pastel</option>
            <option value="light">Claro pastel</option>
        </select>
    </div>

    <div class="container">
        <div class="left">
            <div class="pointer"></div>
            <canvas id="ruleta"></canvas>
        </div>

        <div class="right">
            <textarea id="inputEstudiantes" onkeydown="manejarTeclas(event)"
                placeholder="Escribe un estudiante por línea. Agrega * al final para ocultarlo."></textarea>
            <button onclick="girarRuleta()">🎲 Girar</button>
            <button onclick="reiniciarRuleta()">🔄 Reiniciar</button>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h2>Seleccionado:</h2>
            <p id="resultado"></p>
            <button onclick="cerrarModal(true)">Cerrar</button>
        </div>
    </div>

    <audio id="clickSound">
        <source
            src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAABCxAgAEABAAZGF0YYQAAACAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgIA=="
            type="audio/wav">
    </audio>

    <script>
        const canvas = document.getElementById('ruleta');
        const ctx = canvas.getContext('2d');
        const leftPanel = document.querySelector('.left');
        const themeSelect = document.getElementById('themeSelect');
        let wheelSize = 500;
        let R = wheelSize / 2;

        let estudiantes = [];
        let coloresPorNombre = {};
        let anguloActual = 0;
        let animacion;
        let ultimoGanador = '';
        const sonido = document.getElementById('clickSound');

        function randomPastel() {
            const hue = Math.floor(Math.random() * 360);
            const sat = 68;
            const light = document.body.dataset.theme === 'light' ? 78 : 70;
            return `hsl(${hue}deg ${sat}% ${light}%)`;
        }

        const activos = () => estudiantes.filter((n) => !n.endsWith('*'));

        function ajustarCanvas() {
            const dpr = Math.max(1, window.devicePixelRatio || 1);
            const panelWidth = leftPanel.clientWidth - 24;
            const panelHeight = leftPanel.clientHeight - 24;
            wheelSize = Math.max(220, Math.floor(Math.min(panelWidth, panelHeight, 560)));
            R = wheelSize / 2;

            canvas.style.width = `${wheelSize}px`;
            canvas.style.height = `${wheelSize}px`;
            canvas.width = Math.floor(wheelSize * dpr);
            canvas.height = Math.floor(wheelSize * dpr);

            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            dibujarRuleta();
        }

        function actualizarOrientacion() {
            const portrait = window.innerHeight > window.innerWidth;
            document.body.classList.toggle('portrait', portrait);
            document.body.classList.toggle('landscape', !portrait);
        }

        function manejarTeclas(e) {
            const ta = e.target;
            if (e.key === 'Enter') {
                setTimeout(actualizarEstudiantes, 10);
                return;
            }

            if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                const lines = ta.value.split('\n');
                let pos = 0;
                let idx = 0;
                for (let i = 0; i < lines.length; i++) {
                    pos += lines[i].length + 1;
                    if (ta.selectionStart < pos) {
                        idx = i;
                        break;
                    }
                }
                if (lines[idx]) {
                    lines[idx] = lines[idx].endsWith('*') ? lines[idx].slice(0, -1) : `${lines[idx]}*`;
                    ta.value = lines.join('\n');
                    actualizarEstudiantes();
                }
                e.preventDefault();
            }
        }

        function actualizarEstudiantes() {
            const texto = document.getElementById('inputEstudiantes').value.trim();
            estudiantes = texto.split('\n').map((s) => s.trim()).filter(Boolean);
            estudiantes.forEach((n) => {
                if (!coloresPorNombre[n]) coloresPorNombre[n] = randomPastel();
            });
            dibujarRuleta();
        }

        function dibujarRuleta() {
            const lista = activos();
            ctx.clearRect(0, 0, wheelSize, wheelSize);
            if (!lista.length) return;

            const ang = (2 * Math.PI) / lista.length;

            lista.forEach((nombre, i) => {
                const ini = ang * i + anguloActual;
                const fin = ini + ang;

                ctx.beginPath();
                ctx.moveTo(R, R);
                ctx.arc(R, R, R, ini, fin);
                ctx.closePath();
                ctx.fillStyle = coloresPorNombre[nombre];
                ctx.fill();

                ctx.save();
                ctx.translate(R, R);
                ctx.rotate(ini + ang / 2);
                ctx.fillStyle = '#2f213c';
                const fontPx = Math.max(11, Math.floor(R * 0.07));
                ctx.font = `bold ${fontPx}px Trebuchet MS`;
                ctx.fillText(nombre.replace('*', ''), Math.max(36, R * 0.2), 5);
                ctx.restore();
            });
        }

        function girarRuleta() {
            if (!activos().length) {
                alert('Agrega estudiantes visibles');
                return;
            }

            let vel = Math.random() * 0.5 + 0.5;
            function spin() {
                anguloActual += vel;
                vel *= 0.985;
                sonido.play();

                if (vel < 0.002) {
                    cancelAnimationFrame(animacion);
                    seleccionarGanador();
                } else {
                    dibujarRuleta();
                    animacion = requestAnimationFrame(spin);
                }
            }
            spin();
        }

        function seleccionarGanador() {
            const lista = activos();
            const ang = (2 * Math.PI) / lista.length;
            const rel = ((Math.PI * 1.5 - anguloActual) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
            const idx = Math.floor(rel / ang) % lista.length;

            anguloActual = Math.PI * 1.5 - idx * ang;
            dibujarRuleta();

            ultimoGanador = lista[idx];
            document.getElementById('resultado').textContent = ultimoGanador.replace('*', '');
            document.getElementById('modal').style.display = 'flex';
        }

        function cerrarModal(marcar = true) {
            if (marcar && ultimoGanador) {
                const ta = document.getElementById('inputEstudiantes');
                const lines = ta.value.split('\n').map((l) => (
                    l.replace('*', '') === ultimoGanador.replace('*', '')
                        ? (l.endsWith('*') ? l : `${l}*`)
                        : l
                ));
                ta.value = lines.join('\n');
                actualizarEstudiantes();
            }
            document.getElementById('modal').style.display = 'none';
        }

        function reiniciarRuleta() {
            anguloActual = 0;
            const ta = document.getElementById('inputEstudiantes');
            ta.value = ta.value
                .split('\n')
                .map((l) => l.replace('*', '').trim())
                .filter(Boolean)
                .join('\n');
            actualizarEstudiantes();
        }

        document.getElementById('inputEstudiantes').addEventListener('contextmenu', (e) => {
            e.preventDefault();
            const ta = e.target;
            const lines = ta.value.split('\n');
            let acc = 0;
            let idx = 0;
            for (let i = 0; i < lines.length; i++) {
                acc += lines[i].length + 1;
                if (ta.selectionStart < acc) {
                    idx = i;
                    break;
                }
            }
            if (lines[idx]) lines[idx] = lines[idx].endsWith('*') ? lines[idx].slice(0, -1) : `${lines[idx]}*`;
            ta.value = lines.join('\n');
            actualizarEstudiantes();
        });

        themeSelect.addEventListener('change', () => {
            document.body.dataset.theme = themeSelect.value;
            coloresPorNombre = {};
            estudiantes.forEach((n) => {
                coloresPorNombre[n] = randomPastel();
            });
            dibujarRuleta();
        });

        window.addEventListener('resize', () => {
            actualizarOrientacion();
            ajustarCanvas();
        });
        actualizarOrientacion();
        ajustarCanvas();
    </script>
</body>
</html>
