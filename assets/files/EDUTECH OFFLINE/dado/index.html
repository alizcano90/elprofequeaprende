<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dado 3D Pastel</title>
<style>
    :root {
        --bg: #1f1c2a;
        --bg-soft: #2a2640;
        --text: #efe7ff;
        --muted: #d4c7ea;
        --panel: #2f2a47;
        --panel-border: #4f4872;
        --btn: #f5c7df;
        --btn-text: #312344;
        --btn-disabled: #ccbcd5;
        --accent: #f3e5ff;
        --face-bg: #f6d7e4;
        --face-border: #f0b7cf;
        --face-text: #3a2a4f;
    }

    body[data-theme="light"] {
        --bg: #fff7f4;
        --bg-soft: #ffe8f2;
        --text: #4d3350;
        --muted: #7b5776;
        --panel: #fff3fa;
        --panel-border: #ebcde1;
        --btn: #c8e9ff;
        --btn-text: #2f4452;
        --btn-disabled: #d8e3ea;
        --accent: #ffffff;
        --face-bg: #ffe8f1;
        --face-border: #f8bfd3;
        --face-text: #4a3152;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: radial-gradient(circle at top, var(--bg-soft), var(--bg) 70%);
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        color: var(--text);
        user-select: none;
        padding: 14px;
    }

    h1 { font-size: clamp(1.2rem, 2.8vw, 2rem); }

    .controls {
        width: min(560px, 94vw);
        padding: 12px;
        border: 1px solid var(--panel-border);
        border-radius: 14px;
        background: color-mix(in srgb, var(--panel) 92%, white 8%);
        display: flex;
        gap: 10px;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
    }

    .controls label { color: var(--muted); font-weight: 700; }

    select, button {
        border: none;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 800;
    }

    select {
        background: var(--accent);
        color: #2f213c;
        border: 1px solid var(--panel-border);
    }

    select option { color: #2f213c; }

    button {
        background: var(--btn);
        color: var(--btn-text);
        cursor: pointer;
    }

    button:active { transform: scale(.97); }

    #scene {
        perspective: 900px;
        width: min(56vw, 260px);
        aspect-ratio: 1/1;
    }

    #cube {
        width: 100%;
        height: 100%;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 1s cubic-bezier(.23,1.2,.32,1);
    }

    .face {
        position: absolute;
        inset: 6%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: clamp(2.2rem, 7vw, 4rem);
        font-weight: 800;
        border: 4px solid var(--face-border);
        border-radius: 18px;
        background: var(--face-bg);
        color: var(--face-text);
        box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--face-border) 72%, #fff 28%), 0 8px 18px rgba(0,0,0,.18);
    }

    .front { transform: rotateY(0deg) translateZ(100px); }
    .back { transform: rotateY(180deg) translateZ(100px); }
    .right { transform: rotateY(-90deg) translateZ(100px); }
    .left { transform: rotateY(90deg) translateZ(100px); }
    .top { transform: rotateX(-90deg) translateZ(100px); }
    .bottom { transform: rotateX(90deg) translateZ(100px); }
</style>
</head>
<body data-theme="dark">
    <h1>🎲 Lanza el dado</h1>

    <div class="controls">
        <label for="themeSelect">Tema:</label>
        <select id="themeSelect" aria-label="Tema visual">
            <option value="dark">Oscuro pastel</option>
            <option value="light">Claro pastel</option>
        </select>
        <button id="rollBtn" type="button">Escoge tu destino</button>
    </div>

    <div id="scene">
        <div id="cube">
            <div class="face front">1</div>
            <div class="face back">6</div>
            <div class="face right">2</div>
            <div class="face left">5</div>
            <div class="face top">3</div>
            <div class="face bottom">4</div>
        </div>
    </div>

<script>
(() => {
    const cube = document.getElementById('cube');
    const button = document.getElementById('rollBtn');
    const themeSelect = document.getElementById('themeSelect');

    const orientations = {
        1: { x: 0, y: 0 },
        2: { x: 0, y: -90 },
        3: { x: -90, y: 0 },
        4: { x: 90, y: 0 },
        5: { x: 0, y: 90 },
        6: { x: 0, y: 180 }
    };

    function roll() {
        const value = Math.floor(Math.random() * 6) + 1;
        const extraX = 360 * (Math.floor(Math.random() * 4) + 1);
        const extraY = 360 * (Math.floor(Math.random() * 4) + 1);
        cube.style.transitionDuration = '2.4s';

        const { x, y } = orientations[value];
        cube.style.transform = `rotateX(${x + extraX}deg) rotateY(${y + extraY}deg)`;
    }

    themeSelect.addEventListener('change', () => {
        document.body.dataset.theme = themeSelect.value;
    });

    button.addEventListener('click', roll);
    cube.addEventListener('click', roll);
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            e.preventDefault();
            roll();
        }
    });
})();
</script>
</body>
</html>
