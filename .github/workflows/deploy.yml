name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy files via SCP over SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          target: ${{ secrets.SSH_PATH }}
          overwrite: true
          source: "index.php,index.html,.htaccess,.env.example,assets,includes,pages,config,database,admin,README.md,RESUMEN_PROYECTO_PARA_CHATGPT.md"
